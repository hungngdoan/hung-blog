<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vietnamese Blog Style Lab v2 Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <pre id="error" style="display:none; white-space:pre-wrap; padding:16px; color:#ffd8dd; background:#16090d;"></pre>

    <script>
      (function () {
        var sourceFile = "vietnamese_blog_style_lab_v2.jsx";
        var errorBox = document.getElementById("error");

        function showError(error) {
          errorBox.style.display = "block";
          errorBox.textContent = String(error && (error.stack || error.message) || error);
        }

        fetch(sourceFile)
          .then(function (response) {
            if (!response.ok) throw new Error("Could not load " + sourceFile);
            return response.text();
          })
          .then(function (source) {
            var runnable = source
              .replace(/import React,\s*\{[^}]+\}\s*from\s*"react";\s*/, "const { useMemo, useState } = React;")
              .replace(/import\s*\{\s*motion\s*\}\s*from\s*"framer-motion";\s*/, "const motion = new Proxy({}, { get: function (_, tag) { return tag; } });")
              .replace(/export default function\s+([A-Za-z0-9_]+)/, "function $1");

            runnable += "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(VietnameseBlogStyleLab));";

            var compiled = Babel.transform(runnable, { presets: ["react"] }).code;
            new Function("React", "ReactDOM", compiled)(React, ReactDOM);
          })
          .catch(showError);
      })();
    </script>
  </body>
</html>
